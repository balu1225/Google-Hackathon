version: '3.8'

services:
  backend:
    build: ./backend
    container_name: fraudshield-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATA_MONGODB_URI: ${MONGODB_ATLAS_URI}
      GCP_PROJECT_ID: ${GCP_PROJECT_ID:-}
      GCP_REGION: ${GCP_REGION:-us-central1}
    env_file:
      - .env

  frontend:
    build:
      context: ./frontend
      args:
        VITE_BACKEND_URL: ${VITE_BACKEND_URL:-http://localhost:8080}
    container_name: fraudshield-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    env_file:
      - .env
